<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfriDam AI | Professional Skin Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="app" class="min-h-screen flex flex-col items-center justify-center p-4">
        <div id="landing-step" class="max-w-md text-center space-y-6">
            <div class="inline-block bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-sm font-bold tracking-wide">
                NURSE-LED AI TECHNOLOGY
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight">Professional Skin Analysis in 5 Seconds.</h1>
            <p class="text-slate-600 text-lg">Built for melanin-rich skin. Get your clinical roadmap and product matches instantly.</p>
            <button onclick="startCamera()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold py-5 rounded-2xl shadow-xl transition-all transform hover:scale-105 flex items-center justify-center gap-3">
                START FREE SCAN
            </button>
        </div>

        <div id="scanning-step" class="hidden relative w-full max-w-sm aspect-[3/4] bg-black rounded-3xl overflow-hidden shadow-2xl border-4 border-white">
            <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
            <div class="absolute inset-0 border-[30px] border-black/40 pointer-events-none flex items-center justify-center">
                <div class="w-64 h-80 border-2 border-blue-400 rounded-[100px] border-dashed animate-pulse"></div>
            </div>
            <div class="absolute bottom-10 w-full flex flex-col items-center gap-4 px-6">
                <button onclick="captureImage()" class="w-20 h-20 bg-white rounded-full border-8 border-slate-300 shadow-inner"></button>
            </div>
        </div>

        <div id="wall-step" class="hidden max-w-md w-full bg-white rounded-[32px] p-8 shadow-2xl border border-slate-100">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold">Analysis Complete!</h2>
                <p class="text-slate-500">We've identified your skin biomarkers. Where should we send your report?</p>
            </div>
            <div class="space-y-4">
                <input type="text" placeholder="Full Name" class="w-full border-slate-200 border-2 rounded-xl py-3 px-4">
                <input type="email" placeholder="Email Address" class="w-full border-slate-200 border-2 rounded-xl py-3 px-4">
                <button class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg">REVEAL MY RESULTS</button>
            </div>
        </div>
    </div>

    <script>
        const landing = document.getElementById('landing-step');
        const scanning = document.getElementById('scanning-step');
        const wall = document.getElementById('wall-step');
        const video = document.getElementById('video');

        async function startCamera() {
            landing.classList.add('hidden');
            scanning.classList.remove('hidden');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
        }

        function captureImage() {
            scanning.classList.add('hidden');
            wall.classList.remove('hidden');
            // Here is where the image would be saved for your Medical Team
        }
    </script>
</body>
</html>
